services:
  postgres:
    image: postgres:18-alpine
    container_name: meshi-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-meshi}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-meshi}
      POSTGRES_DB: ${POSTGRES_DB:-meshi}
    ports:
      - '127.0.0.1::5432'
    volumes:
      - meshi-postgres:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'pg_isready -U ${POSTGRES_USER:-meshi} -d ${POSTGRES_DB:-meshi}',
        ]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      target: dev
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-meshi}:${POSTGRES_PASSWORD:-meshi}@postgres:5432/${POSTGRES_DB:-meshi}
      MCP_LISTEN_ADDR: 0.0.0.0:8080
      OPENCODE_API_KEY: ${OPENCODE_API_KEY}
      MESHI_LLM_MODEL: ${MESHI_LLM_MODEL}
      WEB_SEARCH_API_KEY: ${WEB_SEARCH_API_KEY}
      A2A_AGENT_URL: ${A2A_AGENT_URL:-http://localhost:8080/a2a}
    ports:
      - '127.0.0.1::8080'
    volumes:
      - .:/app
      - meshi-app-node-modules:/app/node_modules
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  meshi-postgres:
  meshi-app-node-modules:
